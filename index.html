<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>無心 - Mushin</title>
<meta name="description" content="何も考えず、ただ指を動かす。瞑想のためのちいさなゲーム。">
<meta name="theme-color" content="#0b1026">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="無心">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0b1026;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #c {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #ui {
    position: fixed;
    left: 0;
    right: 0;
    bottom: calc(14px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: center;
    gap: 22px;
    transition: opacity 1.2s ease;
    z-index: 3;
  }
  #ui.idle { opacity: 0.12; }
  .mode-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.22);
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.75);
    font-size: 20px;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    cursor: pointer;
    transition: all 0.4s ease;
  }
  .mode-btn.active {
    border-color: rgba(255, 238, 200, 0.75);
    color: rgba(255, 244, 220, 0.98);
    background: rgba(255, 238, 200, 0.10);
    box-shadow: 0 0 18px rgba(255, 230, 180, 0.25);
  }
  #sound {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    right: calc(14px + env(safe-area-inset-right));
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.65);
    font-size: 17px;
    cursor: pointer;
    transition: opacity 1.2s ease;
    z-index: 3;
  }
  #sound.muted { color: rgba(255, 255, 255, 0.25); }
  #sound.idle { opacity: 0.12; }
  #intro {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: radial-gradient(ellipse at 50% 42%, #141c3f 0%, #0b1026 70%);
    color: #e8e4d8;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    z-index: 10;
    transition: opacity 1.6s ease;
    cursor: pointer;
  }
  #intro.hide { opacity: 0; pointer-events: none; }
  #intro h1 {
    font-size: 54px;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    text-shadow: 0 0 30px rgba(255, 235, 190, 0.35);
    animation: breathe 5.6s ease-in-out infinite;
  }
  #intro .sub {
    font-size: 14px;
    letter-spacing: 0.22em;
    opacity: 0.7;
  }
  #intro .tap {
    margin-top: 34px;
    font-size: 12px;
    letter-spacing: 0.3em;
    opacity: 0.45;
    animation: breathe 5.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.55; transform: scale(0.985); }
    50% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<button id="sound" aria-label="音の切り替え">♪</button>

<div id="ui">
  <button class="mode-btn active" data-mode="bubbles" aria-label="泡モード">泡</button>
  <button class="mode-btn" data-mode="ripples" aria-label="波紋モード">波</button>
  <button class="mode-btn" data-mode="sand" aria-label="砂紋モード">砂</button>
</div>

<div id="intro">
  <h1>無心</h1>
  <div class="sub">なにも考えず、ただ指を動かす</div>
  <div class="tap">— ふれて はじめる —</div>
</div>

<script src="./app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
